<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RCP·2026/11 — Digital Twin Research Loop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #f5f6f7;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        color: #1a1d21;
        -webkit-font-smoothing: antialiased;
      }
      a { color: #0e7490; text-decoration: none; }
      a:hover { color: #0891b2; }
      input, button, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #d3d7db; border-radius: 6px; border: 2px solid #f5f6f7; }
      ::-webkit-scrollbar-thumb:hover { background: #c0c5ca; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
      .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
      .rowhover:hover { background: #f9fafb; }
      input:focus, textarea:focus { border-color: #0891b2 !important; box-shadow: 0 0 0 3px #0891b220; }
      textarea.amber:focus { border-color: #d97706 !important; box-shadow: 0 0 0 3px #d9770620; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
